name: deploy-dev
on:
    push:
        branches:
            - develop

jobs:
    changes:
        name: Check changed projects
        runs-on: ubuntu-latest
        outputs:
            admin: ${{ steps.filter.outputs.admin == 'true' && 'true' || 'false' }}
            web: ${{ steps.filter.outputs.web == 'true' && 'true' || 'false' }}
            landing: ${{ steps.filter.outputs.landing == 'true' && 'true' || 'false' }}
            projects: ${{ steps.filter.outputs.changes }}
            matrix: ${{ steps.set-matrix.outputs.matrix }}
            has-changes: ${{ steps.set-matrix.outputs.has-changes }}
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: develop

            - uses: dorny/paths-filter@v2
              id: filter
              with:
                  base: 'develop'
                  filters: |
                      admin:
                          - 'apps/admin/src/**'
                          - 'apps/admin/public/**'
                          - 'apps/admin/index.html'
                          - 'apps/admin/vite.config.mts'
                          - 'apps/admin/project.json'
                          - 'apps/admin/tsconfig*.json'
                          - 'apps/admin/tailwind.config.js'
                          - 'apps/admin/postcss.config.js'
                      web:
                          - 'apps/web/src/**'
                          - 'apps/web/public/**'
                          - 'apps/web/index.html'
                          - 'apps/web/vite.config.mts'
                          - 'apps/web/project.json'
                          - 'apps/web/tsconfig*.json'
                          - 'apps/web/tailwind.config.js'
                          - 'apps/web/postcss.config.js'
                      landing:
                          - 'apps/landing/src/**'
                          - 'apps/landing/public/**'
                          - 'apps/landing/index.html'
                          - 'apps/landing/vite.config.mts'
                          - 'apps/landing/project.json'
                          - 'apps/landing/tsconfig*.json'
                          - 'apps/landing/tailwind.config.js'
                          - 'apps/landing/postcss.config.js'

            - name: Set matrix for changed projects
              id: set-matrix
              run: |
                  PROJECTS=()
                  [[ "${{ steps.filter.outputs.web }}" == "true" ]] && PROJECTS+=('"web"')
                  [[ "${{ steps.filter.outputs.admin }}" == "true" ]] && PROJECTS+=('"admin"')
                  [[ "${{ steps.filter.outputs.landing }}" == "true" ]] && PROJECTS+=('"landing"')

                  if [ ${#PROJECTS[@]} -eq 0 ]; then
                      echo "matrix=[]" >> $GITHUB_OUTPUT
                      echo "has-changes=false" >> $GITHUB_OUTPUT
                  else
                      MATRIX="[$(IFS=,; echo "${PROJECTS[*]}")]"
                      echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
                      echo "has-changes=true" >> $GITHUB_OUTPUT
                  fi

    version-update:
        needs: changes
        if: ${{ needs.changes.outputs.admin == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.landing == 'true' }}
        name: Update Versions
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        outputs:
            root-version: ${{ steps.version-update.outputs.root-version }}
            admin-version: ${{ steps.version-update.outputs.admin-version }}
            web-version: ${{ steps.version-update.outputs.web-version }}
            landing-version: ${{ steps.version-update.outputs.landing-version }}
        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.LEMON_BOT_TOKEN }}

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version-file: '.nvmrc'

            - name: Get Yarn cache path
              id: yarn-cache-dir-path
              run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

            - name: Cache dependencies
              id: cache-dependencies
              uses: actions/cache@v3
              with:
                  path: |
                      ${{ steps.yarn-cache-dir-path.outputs.dir }}
                      node_modules
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Install dependencies
              if: steps.cache-dependencies.outputs.cache-hit != 'true'
              run: yarn install --frozen-lockfile

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Update versions and changelog
              id: version-update
              run: |
                  set -e
                  chmod +x scripts/version-update.js

                  PROJECTS=()
                  [[ "${{ needs.changes.outputs.web }}" == "true" ]] && PROJECTS+=("web")
                  [[ "${{ needs.changes.outputs.admin }}" == "true" ]] && PROJECTS+=("admin")
                  [[ "${{ needs.changes.outputs.landing }}" == "true" ]] && PROJECTS+=("landing")

                  if [ ${#PROJECTS[@]} -eq 0 ]; then
                    echo "No projects to update"
                  elif [ ${#PROJECTS[@]} -eq 3 ]; then
                    echo "All projects changed - updating all projects"
                    node scripts/version-update.js
                  else
                    echo "Updating projects: ${PROJECTS[*]}"
                    node scripts/version-update.js "${PROJECTS[@]}"
                  fi

                  # Export updated versions
                  ROOT_VERSION=$(node -p "require('./package.json').version")
                  echo "root-version=${ROOT_VERSION}" >> $GITHUB_OUTPUT

                  WEB_VERSION=$(node -p "require('./apps/web/package.json').version")
                  echo "web-version=${WEB_VERSION}" >> $GITHUB_OUTPUT

                  ADMIN_VERSION=$(node -p "require('./apps/admin/package.json').version")
                  echo "admin-version=${ADMIN_VERSION}" >> $GITHUB_OUTPUT

                  LANDING_VERSION=$(node -p "require('./apps/landing/package.json').version")
                  echo "landing-version=${LANDING_VERSION}" >> $GITHUB_OUTPUT

            - name: Commit and push changes
              env:
                  ROOT_VERSION: ${{ steps.version-update.outputs.root-version }}
              run: |
                  set -e
                  git add .
                  git commit -m "chore(release): bump root version to ${ROOT_VERSION} [skip ci]" || echo "No changes to commit"
                  git push

    create-draft-release:
        needs: [changes, version-update]
        if: ${{ needs.changes.outputs.admin == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.landing == 'true' }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: release-drafter/release-drafter@v5
              id: draft
              with:
                  publish: false
                  version: ${{ needs.version-update.outputs.root-version }}
                  tag: ${{ needs.version-update.outputs.root-version }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-and-deploy:
        needs: [changes, version-update]
        if: ${{ needs.changes.outputs.has-changes == 'true' }}
        runs-on: ubuntu-latest
        name: Build and Deploy
        strategy:
            fail-fast: false
            matrix:
                project: ${{ fromJson(needs.changes.outputs.matrix) }}
                include:
                    - project: web
                      prefix: WEB
                    - project: admin
                      prefix: ADMIN
                    - project: landing
                      prefix: LANDING

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.LEMON_BOT_TOKEN }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'

            - name: Get Yarn cache path
              id: yarn-cache-dir-path
              run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

            - name: Cache dependencies
              id: cache-dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ${{ steps.yarn-cache-dir-path.outputs.dir }}
                      node_modules
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Install dependencies
              if: ${{ steps.cache-dependencies.outputs.cache-hit != 'true' }}
              run: yarn install --frozen-lockfile

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

            - name: Generate env file
              run: |
                  set -e
                  ENV_FILE="apps/${{ matrix.project }}/.env"
                  cat > "$ENV_FILE" << 'EOF'
                  VITE_ENV=${{ secrets[format('{0}_DEV_ENV', matrix.prefix)] }}
                  VITE_PROJECT=${{ secrets[format('{0}_DEV_PROJECT', matrix.prefix)] }}
                  VITE_OAUTH_ENDPOINT=${{ secrets[format('{0}_DEV_OAUTH_ENDPOINT', matrix.prefix)] }}
                  VITE_HOST=${{ secrets[format('{0}_DEV_HOST', matrix.prefix)] }}
                  VITE_SOCIAL_OAUTH_ENDPOINT=${{ secrets[format('{0}_DEV_SOCIAL_OAUTH_ENDPOINT', matrix.prefix)] }}
                  VITE_IMAGE_API_ENDPOINT=${{ secrets[format('{0}_DEV_IMAGE_API_ENDPOINT', matrix.prefix)] }}
                  VITE_BACKEND_ENDPOINT=${{ secrets[format('{0}_DEV_BACKEND_ENDPOINT', matrix.prefix)] }}
                  VITE_WS_ENDPOINT=${{ secrets[format('{0}_DEV_WS_ENDPOINT', matrix.prefix)] }}
                  VITE_DOU_ENDPOINT=${{ secrets[format('{0}_DEV_DOU_ENDPOINT', matrix.prefix)] }}
                  VITE_SOC_ENDPOINT=${{ secrets[format('{0}_DEV_SOC_ENDPOINT', matrix.prefix)] }}
                  VITE_FRONT_ENDPOINT=${{ secrets[format('{0}_DEV_FRONT_ENDPOINT', matrix.prefix)] }}
                  EOF
                  sed -i 's/^ *//' "$ENV_FILE"
                  grep -v '=$' "$ENV_FILE" > "$ENV_FILE.tmp" && mv "$ENV_FILE.tmp" "$ENV_FILE"
                  echo "Generated $ENV_FILE:"
                  cat "$ENV_FILE"

            - name: Deploy to DEV
              env:
                  WEB_S3_BUCKET: ${{ secrets.WEB_S3_BUCKET }}
                  WEB_CF_DEV_DISTRIBUTION_ID: ${{ secrets.WEB_CF_DEV_DISTRIBUTION_ID }}
                  ADMIN_S3_BUCKET: ${{ secrets.ADMIN_S3_BUCKET }}
                  ADMIN_CF_DEV_DISTRIBUTION_ID: ${{ secrets.ADMIN_CF_DEV_DISTRIBUTION_ID }}
                  LANDING_S3_DEV_BUCKET: ${{ secrets.LANDING_S3_DEV_BUCKET }}
                  LANDING_S3_PROD_BUCKET: ${{ secrets.LANDING_S3_PROD_BUCKET }}
                  LANDING_CF_DEV_DISTRIBUTION_ID: ${{ secrets.LANDING_CF_DEV_DISTRIBUTION_ID }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_DEV_API_KEY }}
                  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_DEV_AUTH_DOMAIN }}
                  VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_DEV_PROJECT_ID }}
                  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_DEV_STORAGE_BUCKET }}
                  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_DEV_MESSAGING_SENDER_ID }}
                  VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_DEV_APP_ID }}
                  VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_DEV_MEASUREMENT_ID }}
              run: |
                  set -e
                  chmod +x scripts/deploy-${{ matrix.project }}.sh
                  yarn ${{ matrix.project }}:deploy:dev

    notify-slack:
        needs: [changes, version-update, build-and-deploy]
        if: ${{ success() && (needs.changes.outputs.web == 'true' || needs.changes.outputs.admin == 'true' || needs.changes.outputs.landing == 'true') }}
        name: Notify Slack
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Prepare Slack message
              id: slack-message
              run: |
                  set -e
                  TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')
                  COMMIT_SHA="${GITHUB_SHA:0:7}"
                  DEPLOY_MESSAGES=()

                  if [[ "${{ needs.changes.outputs.web }}" == "true" ]]; then
                      DEPLOY_MESSAGES+=("• *웹* <https://dou-dev.chatic.io/|개발 서버> \`v${{ needs.version-update.outputs.web-version }}\`")
                  fi

                  if [[ "${{ needs.changes.outputs.admin }}" == "true" ]]; then
                      DEPLOY_MESSAGES+=("• *어드민* <https://admin-dev.chatic.io/|개발 서버> \`v${{ needs.version-update.outputs.admin-version }}\`")
                  fi

                  if [[ "${{ needs.changes.outputs.landing }}" == "true" ]]; then
                      DEPLOY_MESSAGES+=("• *랜딩* <https://app-dev.chatic.io/|개발 서버> \`v${{ needs.version-update.outputs.landing-version }}\`")
                  fi

                  if [ ${#DEPLOY_MESSAGES[@]} -eq 0 ]; then
                      DEPLOY_INFO="*개발 환경 배포가 완료되었습니다.*"
                  else
                      DEPLOY_INFO=$(printf "%s\n" "${DEPLOY_MESSAGES[@]}")
                  fi

                  {
                    echo "deploy_info<<EOF"
                    echo -e "$DEPLOY_INFO"
                    echo "EOF"
                    echo "timestamp=${TIMESTAMP}"
                    echo "commit_sha=${COMMIT_SHA}"
                  } >> $GITHUB_OUTPUT || {
                    echo "deploy_info=⚠️ 배포 메시지 생성 실패" >> $GITHUB_OUTPUT
                    echo "timestamp=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
                    echo "commit_sha=error" >> $GITHUB_OUTPUT
                  }

            - name: Post to a Slack channel
              continue-on-error: true
              uses: slackapi/slack-github-action@v2.1.1
              with:
                  method: chat.postMessage
                  token: ${{ secrets.RELEASE_BOT_TOKEN }}
                  payload: |
                      channel: ${{ secrets.CHATIC_CHANNEL }}
                      unfurl_links: false
                      unfurl_media: false
                      text: "DoU 개발 배포 알림"
                      blocks: [
                         {
                             "type": "header",
                             "text": {
                                 "type": "plain_text",
                                 "text": ":dou: DoU 개발 환경 배포 완료"
                             }
                         },
                         {
                             "type": "section",
                             "text": {
                                 "type": "mrkdwn",
                                 "text": ${{ toJSON(steps.slack-message.outputs.deploy_info) }}
                             }
                         },
                         {
                             "type": "divider"
                         },
                         {
                             "type": "section",
                             "fields": [
                                 {
                                     "type": "mrkdwn",
                                     "text": "*배포 시각:*\n${{ steps.slack-message.outputs.timestamp }}"
                                 },
                                 {
                                     "type": "mrkdwn",
                                     "text": "*커밋:*\n<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ steps.slack-message.outputs.commit_sha }}>"
                                 }
                             ]
                         },
                         {
                             "type": "context",
                             "elements": [
                                 {
                                     "type": "mrkdwn",
                                     "text": "by ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Actions Run>"
                                 }
                             ]
                         }
                      ]

    notify-slack-failure:
        needs: [changes, version-update, create-draft-release, build-and-deploy]
        if: ${{ failure() && (needs.changes.outputs.web == 'true' || needs.changes.outputs.admin == 'true' || needs.changes.outputs.landing == 'true') }}
        name: Notify Slack - Failure
        runs-on: ubuntu-latest
        steps:
            - name: Prepare Slack message
              id: slack-message
              run: |
                  set -e
                  TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')
                  COMMIT_SHA="${GITHUB_SHA:0:7}"
                  DEPLOY_MESSAGES=()

                  if [[ "${{ needs.changes.outputs.web }}" == "true" ]]; then
                      DEPLOY_MESSAGES+=("• *웹* 개발 서버")
                  fi

                  if [[ "${{ needs.changes.outputs.admin }}" == "true" ]]; then
                      DEPLOY_MESSAGES+=("• *어드민* 개발 서버")
                  fi

                  if [[ "${{ needs.changes.outputs.landing }}" == "true" ]]; then
                      DEPLOY_MESSAGES+=("• *랜딩* 개발 서버")
                  fi

                  if [ ${#DEPLOY_MESSAGES[@]} -eq 0 ]; then
                      DEPLOY_INFO="*개발 환경 배포 중 오류가 발생했습니다.*"
                  else
                      DEPLOY_INFO=$(printf "*배포 실패:*\n%s" "$(printf "%s\n" "${DEPLOY_MESSAGES[@]}")")
                  fi

                  {
                    echo "deploy_info<<EOF"
                    echo -e "$DEPLOY_INFO"
                    echo "EOF"
                    echo "timestamp=${TIMESTAMP}"
                    echo "commit_sha=${COMMIT_SHA}"
                  } >> $GITHUB_OUTPUT || {
                    echo "deploy_info=⚠️ 배포 메시지 생성 실패" >> $GITHUB_OUTPUT
                    echo "timestamp=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
                    echo "commit_sha=error" >> $GITHUB_OUTPUT
                  }

            - name: Post failure to Slack
              continue-on-error: true
              uses: slackapi/slack-github-action@v2.1.1
              with:
                  method: chat.postMessage
                  token: ${{ secrets.RELEASE_BOT_TOKEN }}
                  payload: |
                      channel: ${{ secrets.CHATIC_CHANNEL }}
                      unfurl_links: false
                      unfurl_media: false
                      text: "DoU 개발 배포 실패"
                      blocks: [
                          {
                              "type": "header",
                              "text": {
                                  "type": "plain_text",
                                  "text": ":x: DoU 개발 환경 배포 실패"
                              }
                          },
                          {
                              "type": "section",
                              "text": {
                                  "type": "mrkdwn",
                                  "text": ${{ toJSON(steps.slack-message.outputs.deploy_info) }}
                              }
                          },
                          {
                              "type": "divider"
                          },
                          {
                              "type": "section",
                              "fields": [
                                  {
                                      "type": "mrkdwn",
                                      "text": "*배포 시각:*\n${{ steps.slack-message.outputs.timestamp }}"
                                  },
                                  {
                                      "type": "mrkdwn",
                                      "text": "*커밋:*\n<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ steps.slack-message.outputs.commit_sha }}>"
                                  }
                              ]
                          },
                          {
                              "type": "context",
                              "elements": [
                                  {
                                      "type": "mrkdwn",
                                      "text": "by ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Failed Actions Run>"
                                  }
                              ]
                          }
                      ]
