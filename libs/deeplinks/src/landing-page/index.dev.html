<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <title>Chatic (Dev) - 앱 다운로드</title>
        <link
            rel="stylesheet"
            as="style"
            crossorigin
            href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        />
        <style>
            /* =================================
               CSS Variables & Design Tokens
               ================================= */
            :root {
                /* Chatic Brand Colors - Dev (slightly different for distinction) */
                --primary-color: #8b5cf6;
                --primary-dark: #7c3aed;
                --primary-light: #a78bfa;
                --text-color: #1f2937;
                --text-secondary: #9ca3af;
                --bg-color: #ffffff;
                --white: #ffffff;
                --shadow-primary: rgba(139, 92, 246, 0.3);
                --shadow-dark: rgba(124, 58, 237, 0.3);

                /* Typography */
                --font-family:
                    'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'SF Pro Text',
                    'Helvetica Neue', sans-serif;
                --font-weight-normal: 400;
                --font-weight-medium: 600;
                --font-weight-bold: 700;

                /* Sizes */
                --container-max-width: 400px;
                --logo-size: 120px;
                --logo-radius: 24px;
                --button-radius: 12px;
            }

            /* =================================
               Global Styles & Reset
               ================================= */
            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: var(--font-family);
            }

            #root {
                height: 100%;
                overflow: hidden;
                position: relative;
            }

            /* =================================
               Layout Components
               ================================= */
            .landing-page-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                width: 100%;
                background: var(--bg-color);
                padding: 0;
                margin: 0;
                color: var(--text-color);
                text-align: center;
                position: absolute;
                top: 0;
                left: 0;
                overflow: hidden;
            }

            .content-container {
                position: relative;
                z-index: 1;
                max-width: var(--container-max-width);
                width: 100%;
                padding: 20px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            /* =================================
               Environment Badge
               ================================= */
            .env-badge {
                position: fixed;
                top: 12px;
                right: 12px;
                background: #7c3aed;
                color: white;
                padding: 4px 12px;
                border-radius: 12px;
                font-size: 12px;
                font-weight: 600;
                z-index: 100;
            }

            /* =================================
               Logo Component
               ================================= */
            .logo-container {
                margin-bottom: 32px;
                width: var(--logo-size);
                height: var(--logo-size);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }

            .logo-image {
                width: 100%;
                height: 100%;
                object-fit: contain;
                border-radius: var(--logo-radius);
            }

            /* =================================
               Typography & Text Layout
               ================================= */
            .text-section {
                margin-bottom: 48px;
                flex-shrink: 0;
            }

            .main-title {
                font-size: clamp(20px, 5vw, 24px);
                font-weight: var(--font-weight-bold);
                margin: 0 0 24px 0;
                line-height: 1.3;
                letter-spacing: -0.5px;
            }

            .sub-text {
                font-size: clamp(14px, 4vw, 16px);
                font-weight: var(--font-weight-normal);
                margin: 0 0 8px 0;
                line-height: 1.5;
                color: var(--text-secondary);
            }

            .sub-text:last-child {
                margin-bottom: 0;
            }

            /* =================================
               Spinner Component
               ================================= */
            .spinner {
                margin: 20px auto;
                width: 40px;
                height: 40px;
                border: 3px solid #f3f3f3;
                border-top: 3px solid var(--primary-color);
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            /* =================================
               Button Component
               ================================= */
            .cta-button {
                background: var(--primary-color);
                border: none;
                color: var(--white);
                font-size: clamp(15px, 4vw, 16px);
                font-weight: var(--font-weight-medium);
                padding: 16px 32px;
                border-radius: var(--button-radius);
                cursor: pointer;
                font-family: inherit;
                letter-spacing: -0.3px;
                transition: all 0.2s ease;
                min-width: clamp(200px, 70vw, 280px);
                box-shadow: 0 4px 16px var(--shadow-primary);
                position: relative;
                overflow: hidden;
                flex-shrink: 0;
                text-decoration: none;
                display: inline-block;
            }

            .cta-button:hover {
                background-color: var(--primary-dark);
                transform: translateY(-2px);
                box-shadow: 0 6px 20px var(--shadow-dark);
            }

            .cta-button:active {
                transform: translateY(0);
            }

            .cta-button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                pointer-events: none;
            }

            /* =================================
               Desktop Message
               ================================= */
            .desktop-message {
                display: none;
                color: var(--text-secondary);
                line-height: 1.8;
                font-size: 15px;
            }

            .desktop-message p {
                margin-bottom: 8px;
            }

            .desktop-message strong {
                color: var(--text-color);
                font-weight: 600;
            }

            /* =================================
               Store Links
               ================================= */
            .store-links {
                display: none;
                margin-top: 24px;
            }

            .message {
                color: var(--text-secondary);
                font-size: 14px;
                margin-top: 16px;
            }

            /* =================================
               Responsive Design
               ================================= */
            @media (max-width: 480px) {
                .main-title {
                    font-size: 22px;
                }

                .sub-text {
                    font-size: 15px;
                }

                .cta-button {
                    font-size: 16px;
                    padding: 14px 28px;
                    min-width: 220px;
                }
            }

            @media (max-width: 360px) {
                .content-container {
                    padding: 15px;
                }

                .main-title {
                    font-size: 20px;
                }

                .sub-text {
                    font-size: 14px;
                }

                .cta-button {
                    font-size: 15px;
                    padding: 12px 24px;
                    min-width: 200px;
                }

                .logo-container {
                    width: 100px;
                    height: 100px;
                }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <!-- Environment Badge -->
            <div class="env-badge">DEV</div>

            <!-- Landing Page -->
            <div id="landing-page" class="landing-page-container">
                <div class="content-container">
                    <!-- Logo -->
                    <div class="logo-container">
                        <img
                            id="app-logo"
                            src="https://dou-dev.chatic.io/assets/logo.png"
                            alt="Chatic"
                            class="logo-image"
                        />
                    </div>

                    <!-- Text Section -->
                    <div class="text-section" id="text-section">
                        <h1 class="main-title" id="main-title">Chatic (Dev) 앱으로 이동</h1>
                        <p class="sub-text">앱 설치 확인을 위해</p>
                        <p class="sub-text">아래 버튼을 눌러주세요</p>
                    </div>

                    <!-- App Open Button -->
                    <button id="app-open-button" class="cta-button">Chatic 앱에서 열기</button>

                    <!-- Store Links (Hidden by default) -->
                    <div class="store-links" id="store-links">
                        <a href="#" class="cta-button" id="store-button">앱 다운로드</a>
                    </div>

                    <!-- Desktop Message (Hidden by default) -->
                    <div class="desktop-message" id="desktop-message">
                        <p>모바일 기기에서 접속해 주세요.</p>
                        <br />
                        <p id="desktop-message-content">
                            <strong>iOS:</strong> App Store에서 'Chatic' 검색
                            <br />
                            <strong>Android:</strong> Google Play에서 'Chatic' 검색
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Firebase SDK for Deferred Deep Linking -->
        <script type="module">
            // =================================
            // Firebase Configuration
            // =================================
            import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
            import {
                getFirestore,
                collection,
                addDoc,
                serverTimestamp,
                Timestamp,
            } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

            // Firebase Configuration - DEVELOPMENT (lemondu-ecb38)
            const firebaseConfig = {
                apiKey: 'AIzaSyDJhO7CKBmo96duaWdwNn5mV3yKXAEwDD4',
                authDomain: 'lemondu-ecb38.firebaseapp.com',
                projectId: 'lemondu-ecb38',
                storageBucket: 'lemondu-ecb38.firebasestorage.app',
                messagingSenderId: '429595905351',
                appId: '1:429595905351:web:a1866c5f60565098abd062',
                measurementId: 'G-M8FFL54LLP',
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            // =================================
            // App Configuration - DEVELOPMENT
            // =================================
            const APP_CONFIG = {
                name: 'Chatic (Dev)',
                scheme: 'chatic-dev',
                packageId: 'io.chatic.dou.dev',
                appStoreId: '6758756090',
                logoUrl: 'https://dou-dev.chatic.io/assets/logo.png',
                storeUrls: {
                    ios: 'https://apps.apple.com/app/id6758756090',
                    android: 'https://play.google.com/store/apps/details?id=io.chatic.dou.dev',
                },
            };

            const APP_LAUNCH_TIMEOUT = 2500;
            const COLLECTION_NAME = 'deferredDeepLinks';
            const LINK_TTL_HOURS = 1;

            // =================================
            // Device Detection
            // =================================
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            const isAndroid = /android/i.test(userAgent);

            // =================================
            // URL Path Extraction
            // =================================
            const path = window.location.pathname;
            const search = window.location.search;
            const fullPath = path + search;
            const deepLinkUrl = window.location.href;

            // =================================
            // Fingerprint Generation (Must match mobile app)
            // =================================
            async function generateFingerprint() {
                let ip = 'unknown';
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    ip = data.ip || 'unknown';
                } catch (e) {
                    console.error('[Fingerprint] Failed to get IP:', e);
                }

                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const locale = (navigator.language || 'unknown').split('-')[0];

                const str = `${ip}|${timezone}|${locale}`;
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = (hash << 5) - hash + char;
                    hash = hash & hash;
                }

                return Math.abs(hash).toString(16).padStart(8, '0');
            }

            // =================================
            // Deferred Deep Link Storage
            // =================================
            async function storeDeferredDeepLink(url) {
                try {
                    const fingerprint = await generateFingerprint();
                    const expiresAt = Timestamp.fromDate(new Date(Date.now() + LINK_TTL_HOURS * 60 * 60 * 1000));

                    await addDoc(collection(db, COLLECTION_NAME), {
                        fingerprint,
                        deepLinkUrl: url,
                        createdAt: serverTimestamp(),
                        expiresAt,
                    });

                    console.log('[Deferred] Stored:', { fingerprint, url });
                } catch (error) {
                    console.error('[Deferred] Failed to store:', error);
                }
            }

            // =================================
            // Event Handlers
            // =================================
            function createEventHandlers() {
                let appOpened = false;

                const blurHandler = () => {
                    appOpened = true;
                    console.log('[App] Opened via blur event');
                };

                const visibilityHandler = () => {
                    if (document.hidden) {
                        appOpened = true;
                        console.log('[App] Opened via visibility change');
                    }
                };

                const cleanup = () => {
                    window.removeEventListener('blur', blurHandler);
                    window.removeEventListener('visibilitychange', visibilityHandler);
                };

                return { blurHandler, visibilityHandler, cleanup, getAppOpened: () => appOpened };
            }

            function updateUIForStore(elements, storeUrl, storeName) {
                const { mainTitle, textSection, appOpenButton, storeLinks, storeButton } = elements;

                if (mainTitle) mainTitle.textContent = APP_CONFIG.name + ' 앱 다운로드';
                if (textSection) {
                    const subTexts = textSection.querySelectorAll('.sub-text');
                    if (subTexts[0]) subTexts[0].textContent = '앱이 설치되어 있지 않습니다';
                    if (subTexts[1]) subTexts[1].textContent = '스토어에서 다운로드해 주세요';
                }
                if (appOpenButton) appOpenButton.style.display = 'none';
                if (storeLinks) storeLinks.style.display = 'block';
                if (storeButton) {
                    storeButton.href = storeUrl;
                    storeButton.textContent = storeName + '에서 다운로드';
                }
            }

            // =================================
            // iOS App Launch
            // =================================
            async function attemptIOSAppLaunch(customSchemeUrl, elements) {
                const { mainTitle, appOpenButton } = elements;

                if (mainTitle) mainTitle.textContent = '앱을 여는 중...';
                if (appOpenButton) appOpenButton.disabled = true;

                console.log('[iOS] Opening:', customSchemeUrl);

                const handlers = createEventHandlers();
                window.addEventListener('blur', handlers.blurHandler);
                window.addEventListener('visibilitychange', handlers.visibilityHandler);

                window.location.href = customSchemeUrl;

                setTimeout(async () => {
                    handlers.cleanup();

                    if (!handlers.getAppOpened()) {
                        console.log('[iOS] App not opened, storing deferred link');
                        await storeDeferredDeepLink(deepLinkUrl);
                    }

                    updateUIForStore(elements, APP_CONFIG.storeUrls.ios, 'App Store');
                }, APP_LAUNCH_TIMEOUT);
            }

            // =================================
            // Android App Launch
            // =================================
            async function attemptAndroidAppLaunch(intentUrl, elements) {
                const { mainTitle, appOpenButton } = elements;

                if (mainTitle) mainTitle.textContent = '앱을 여는 중...';
                if (appOpenButton) appOpenButton.disabled = true;

                console.log('[Android] Opening:', intentUrl);

                const handlers = createEventHandlers();
                window.addEventListener('blur', handlers.blurHandler);
                window.addEventListener('visibilitychange', handlers.visibilityHandler);

                window.location.href = intentUrl;

                setTimeout(async () => {
                    handlers.cleanup();

                    if (!handlers.getAppOpened()) {
                        console.log('[Android] App not opened, storing deferred link');
                        await storeDeferredDeepLink(deepLinkUrl);
                    }

                    updateUIForStore(elements, APP_CONFIG.storeUrls.android, 'Play Store');
                }, APP_LAUNCH_TIMEOUT);
            }

            // =================================
            // Main Initialization
            // =================================
            function init() {
                const elements = {
                    logo: document.getElementById('app-logo'),
                    textSection: document.getElementById('text-section'),
                    mainTitle: document.getElementById('main-title'),
                    appOpenButton: document.getElementById('app-open-button'),
                    storeLinks: document.getElementById('store-links'),
                    storeButton: document.getElementById('store-button'),
                    desktopMessage: document.getElementById('desktop-message'),
                };

                // Set logo
                if (elements.logo) {
                    elements.logo.src = APP_CONFIG.logoUrl;
                    elements.logo.alt = APP_CONFIG.name;
                }

                console.log('[Web] Environment: DEVELOPMENT');
                console.log('[Web] Deep link URL:', deepLinkUrl);
                console.log('[Web] Path:', fullPath);

                // Desktop - show message
                if (!isIOS && !isAndroid) {
                    if (elements.textSection) elements.textSection.style.display = 'none';
                    if (elements.appOpenButton) elements.appOpenButton.style.display = 'none';
                    if (elements.desktopMessage) elements.desktopMessage.style.display = 'block';
                    return;
                }

                // Mobile - setup button
                if (elements.appOpenButton) {
                    elements.appOpenButton.addEventListener('click', () => {
                        if (isIOS) {
                            const customSchemeUrl = APP_CONFIG.scheme + '://' + fullPath.replace(/^\//, '');
                            attemptIOSAppLaunch(customSchemeUrl, elements);
                        } else if (isAndroid) {
                            const intentUrl =
                                'intent://' +
                                fullPath.replace(/^\//, '') +
                                '#Intent;scheme=' +
                                APP_CONFIG.scheme +
                                ';package=' +
                                APP_CONFIG.packageId +
                                ';S.browser_fallback_url=' +
                                encodeURIComponent(APP_CONFIG.storeUrls.android) +
                                ';end';
                            attemptAndroidAppLaunch(intentUrl, elements);
                        }
                    });
                }
            }

            // Execute
            init();
        </script>
    </body>
</html>
