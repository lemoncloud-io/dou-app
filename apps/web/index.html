<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>DoU</title>
        <base href="/" />

        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <meta name="theme-color" id="theme-color-meta" content="#ffffff" />
        <!-- Theme detection script - must run before any content renders -->
        <script>
            (function () {
                var storageKey = 'vite-ui-theme';
                var theme = localStorage.getItem(storageKey);
                var isDark =
                    theme === 'dark' ||
                    (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

                var bgColor = isDark ? '#121212' : '#ffffff';
                document.documentElement.style.setProperty('--splash-bg', bgColor);

                if (isDark) {
                    document.documentElement.classList.add('dark');
                    document.getElementById('theme-color-meta').content = '#121212';
                } else {
                    document.documentElement.classList.remove('dark');
                    document.getElementById('theme-color-meta').content = '#ffffff';
                }
            })();
        </script>
        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/site.webmanifest" />
        <link rel="stylesheet" href="/src/styles.css" />
    </head>
    <body>
        <!-- Splash screen (OUTSIDE #root so React doesn't destroy it) -->
        <div
            id="initial-splash"
            style="
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: var(--splash-bg, #ffffff);
            "
        >
            <div id="splash-lottie" style="width: 75%; max-width: 400px; aspect-ratio: 1 / 1"></div>
        </div>

        <div id="root"></div>

        <!-- Splash bootstrap (uses installed lottie-web, Vite resolves the import) -->
        <script type="module">
            import lottie from 'lottie-web/build/player/lottie_light';

            (function () {
                // 세션 내 스플래시 1회만 표시 (앱 구동 시 한 번)
                try {
                    if (sessionStorage.getItem('chatic-splash-shown') === 'true') {
                        var el = document.getElementById('initial-splash');
                        if (el) el.remove();
                        return;
                    }
                } catch (e) {}

                window.__splash = { animDone: false, appReady: false };

                var container = document.getElementById('splash-lottie');
                var lottieFile = document.documentElement.classList.contains('dark')
                    ? '/lottie-dark.json'
                    : '/lottie.json';
                if (container) {
                    fetch(lottieFile)
                        .then(function (res) {
                            return res.json();
                        })
                        .then(function (data) {
                            var anim = lottie.loadAnimation({
                                container: container,
                                renderer: 'svg',
                                loop: false,
                                autoplay: true,
                                animationData: data,
                            });

                            anim.addEventListener('complete', function () {
                                window.__splash.animDone = true;
                                window.__tryRemoveSplash();
                            });
                        });
                }

                window.__tryRemoveSplash = function () {
                    if (window.__splash.animDone && window.__splash.appReady) {
                        var el = document.getElementById('initial-splash');
                        if (el) {
                            el.style.transition = 'opacity 0.4s ease-out';
                            el.style.opacity = '0';
                            setTimeout(function () {
                                el.remove();
                                try {
                                    sessionStorage.setItem('chatic-splash-shown', 'true');
                                } catch (e) {}
                            }, 400);
                        }
                    }
                };
            })();
        </script>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
