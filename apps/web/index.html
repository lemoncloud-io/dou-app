<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>DoU</title>
        <base href="/" />

        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <meta name="theme-color" id="theme-color-meta" content="#ffffff" />
        <!-- Theme detection script - must run before any content renders -->
        <script>
            (function () {
                var storageKey = 'vite-ui-theme';
                var theme = localStorage.getItem(storageKey);
                // Match ThemeProvider logic: default to 'light' when no theme is stored
                var isDark =
                    theme === 'dark' ||
                    (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

                // Set CSS custom property for splash background
                var bgColor = isDark ? '#121212' : '#ffffff';
                document.documentElement.style.setProperty('--splash-bg', bgColor);

                if (isDark) {
                    document.documentElement.classList.add('dark');
                    document.getElementById('theme-color-meta').content = '#121212';
                } else {
                    document.documentElement.classList.remove('dark');
                    document.getElementById('theme-color-meta').content = '#ffffff';
                }
            })();
        </script>
        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/site.webmanifest" />
        <link rel="stylesheet" href="/src/styles.css" />
    </head>
    <body>
        <div id="root">
            <!-- Initial splash screen (shown before React loads) -->
            <div
                id="initial-splash"
                style="
                    position: fixed;
                    inset: 0;
                    z-index: 9999;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    background-color: var(--splash-bg, #ffffff);
                "
            >
                <img
                    src="/logo.png"
                    alt="DoU"
                    style="width: 96px; height: 96px; object-fit: contain; animation: pulse 2s ease-in-out infinite"
                />
                <div style="margin-top: 32px; display: flex; align-items: center; gap: 4px">
                    <div
                        style="
                            width: 8px;
                            height: 8px;
                            border-radius: 50%;
                            background-color: #b0ea10;
                            animation: bounce 1s ease-in-out infinite;
                            animation-delay: -0.3s;
                        "
                    ></div>
                    <div
                        style="
                            width: 8px;
                            height: 8px;
                            border-radius: 50%;
                            background-color: #b0ea10;
                            animation: bounce 1s ease-in-out infinite;
                            animation-delay: -0.15s;
                        "
                    ></div>
                    <div
                        style="
                            width: 8px;
                            height: 8px;
                            border-radius: 50%;
                            background-color: #b0ea10;
                            animation: bounce 1s ease-in-out infinite;
                        "
                    ></div>
                </div>
            </div>
            <style>
                @keyframes pulse {
                    0%,
                    100% {
                        opacity: 1;
                        transform: scale(1);
                    }
                    50% {
                        opacity: 0.8;
                        transform: scale(0.95);
                    }
                }
                @keyframes bounce {
                    0%,
                    100% {
                        transform: translateY(0);
                    }
                    50% {
                        transform: translateY(-6px);
                    }
                }
            </style>
        </div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
